name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: TypeScript converter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      PNPM_CONFIG_IGNORE_SCRIPTS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

  kotlin:
    name: Kotlin script converter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Kotlin
        uses: fwilhe2/setup-kotlin@v1.8
        with:
          version: 2.2.21

      - name: Run Kotlin converter tests
        run: ./kotlin/test.sh
